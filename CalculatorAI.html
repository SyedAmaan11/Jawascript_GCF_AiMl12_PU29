<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist Calculator</title>
    <style>
        :root {
            --bg: #FEF2E4;
            --accent: #FFCC00;
            --border: #000000;
            --shadow: #000000;
        }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calc-body {
            background: white;
            border: 4px solid var(--border);
            box-shadow: 8px 8px 0px var(--shadow);
            padding: 20px;
            width: 300px;
        }

        #screen {
            width: 100%;
            height: 60px;
            border: 4px solid var(--border);
            margin-bottom: 20px;
            padding: 10px;
            font-size: 1.5rem;
            font-weight: 900;
            text-align: right;
            box-sizing: border-box;
            background: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border: 3px solid var(--border);
            background: white;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--shadow);
            transition: all 0.1s;
        }

        button:active {
            box-shadow: 0px 0px 0px var(--shadow);
            transform: translate(4px, 4px);
        }

        .op { background: var(--accent); }
        .eq { background: #FF5C00; color: white; grid-column: span 2; }
        .clr { background: #00F0FF; }

    </style>
</head>
<body>

<div class="calc-body">
    <input type="text" id="screen" readonly value="0">
    <div class="grid">
        <button class="clr" onclick="clearAll()">AC</button>
        <button class="op" onclick="push('(')">(</button>
        <button class="op" onclick="push(')')">)</button>
        <button class="op" onclick="push('/')">÷</button>

        <button onclick="push('7')">7</button>
        <button onclick="push('8')">8</button>
        <button onclick="push('9')">9</button>
        <button class="op" onclick="push('*')">×</button>

        <button onclick="push('4')">4</button>
        <button onclick="push('5')">5</button>
        <button onclick="push('6')">6</button>
        <button class="op" onclick="push('-')">-</button>

        <button onclick="push('1')">1</button>
        <button onclick="push('2')">2</button>
        <button onclick="push('3')">3</button>
        <button class="op" onclick="push('+')">+</button>

        <button onclick="push('0')">0</button>
        <button onclick="push('.')">.</button>
        <button class="eq" onclick="solve()">=</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');

    function push(val) {
        if (screen.value === "0") screen.value = val;
        else screen.value += val;
    }

    function clearAll() {
        screen.value = "0";
    }

    function solve() {
        try {
            // Replaces pretty symbols with JS math symbols
            let expression = screen.value;
            screen.value = eval(expression);
        } catch {
            screen.value = "Error";
        }
    }
</script>

</body>
</html>
